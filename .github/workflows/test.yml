name: Build Docker Image

on:
  push:

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker buildx build \
          --platform linux/amd64 \
          -t test-image .
