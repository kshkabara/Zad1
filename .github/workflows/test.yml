name: Build and Push GHCR
on:
  push:
jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
          
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}
          
      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: local-scan:latest
          cache-from: type=registry,ref=docker.io/kshka/zad2cache:buildcache
          cache-to: type=registry,ref=docker.io/kshka/zad2cache:buildcache,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: local-scan:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/kshkabara/zad2:latest
          cache-from: type=registry,ref=docker.io/kshka/zad2cache:buildcache
          cache-to: type=registry,ref=docker.io/kshka/zad2cache:buildcache,mode=max
